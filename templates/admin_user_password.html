{% extends 'admin_base.html' %}

{% block title %}
  パスワード変更
{% endblock %}

{% block content %}
  <h1 class="section-title">パスワード変更</h1>

  <div class="form-card">
    <div class="form-group">
      <label class="form-label">対象メンバー</label>
      <div class="form-input" style="background:#f5f6fa;">{{ user.name }} / {{ user.email }}</div>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">新しいパスワード</label>
        <input type="password" name="password" class="form-input" required />
      </div>

      <button type="submit" class="primary-button">パスワードを変更する</button>
    </form>
  </div>
{% endblock %}
