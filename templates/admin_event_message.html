{% extends 'admin_base.html' %}

{% block title %}
  参加者へ連絡 | くれよんママ
{% endblock %}

{% block content %}
  <section class="admin-message-page">
    <div class="admin-page-head">
      <div>
        <h1 class="section-title">参加者へ連絡</h1>
        <p class="page-lead">{{ event.title }} の申込者へメールを送信します。</p>
      </div>
    </div>

    <div class="form-card">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">送信対象</label>
          <select name="target" class="form-select">
            <option value="confirmed">確定者のみ</option>
            <option value="waiting">待機者のみ</option>
            <option value="all">全員</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">件名</label>
          <input type="text" name="subject" class="form-input" value="【くれよんママ】{{ event.title }}について" required />
        </div>

        <div class="form-group">
          <label class="form-label">本文</label>
          <textarea name="message" class="form-textarea" rows="10" placeholder="例：持ち物や開催時間の変更などを入力してください" required></textarea>
        </div>

        <button type="submit" class="primary-button" onclick="return confirm('選択した申込者へメールを送信しますか？');">メールを送信する</button>

        <a href="{{ url_for('admin_applications') }}" class="cancel-back-button">戻る</a>
      </form>
    </div>
  </section>
{% endblock %}
