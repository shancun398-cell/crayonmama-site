{% extends 'admin_base.html' %}

{% block title %}
  イベント作成 | くれよんママ
{% endblock %}

{% block content %}
  <h1 class="section-title">イベント作成</h1>

  <div class="form-card">
    <form method="POST" enctype="multipart/form-data">
      <div class="form-group">
        <label class="form-label">活動カテゴリ</label>
        <input type="text" name="category" class="form-input" required />
      </div>

      <div class="form-group">
        <label class="form-label">イベント名</label>
        <input type="text" name="title" class="form-input" required />
      </div>

      <div class="form-group">
        <label class="form-label">チラシ画像</label>
        <input type="file" name="flyer_image" class="form-input" accept="image/*" />
      </div>

      <div class="form-group">
        <label class="form-label">開催日</label>
        <input type="date" name="date" class="form-input" required />
      </div>

      <div class="form-group">
        <label class="form-label">開催時間①</label>

        <div class="time-range-row">
          <input type="time" name="time1_start" class="form-input" value="{{ event.time1_start or '10:00' }}" />

          <span class="time-range-separator">〜</span>

          <input type="time" name="time1_end" class="form-input" value="{{ event.time1_end or '11:00' }}" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">定員①</label>

        <input type="number" name="capacity_time1" class="form-input" value="{{ event.capacity_time1 or 10 }}" />
      </div>

      <div class="form-group">
        <label class="form-label">開催時間②（任意）</label>

        <div class="time-range-row">
          <input type="time" name="time2_start" class="form-input" value="{{ event.time2_start or '' }}" />

          <span class="time-range-separator">〜</span>

          <input type="time" name="time2_end" class="form-input" value="{{ event.time2_end or '' }}" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">定員②</label>

        <input type="number" name="capacity_time2" class="form-input" value="{{ event.capacity_time2 or '' }}" />
      </div>

      <div class="form-group">
        <label class="form-label">状態</label>
        <select name="status" class="form-select">
          <option value="公開">公開</option>
          <option value="下書き">下書き</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">定員（組）</label>
        <input type="number" name="capacity" class="form-input" />
      </div>

      <div class="form-group">
        <label class="form-label">説明</label>
        <textarea name="description" class="form-textarea"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">開催場所</label>
        <input type="text" name="location" class="form-input" />
      </div>

      <button type="submit" class="primary-button">作成する</button>
    </form>
  </div>
{% endblock %}
