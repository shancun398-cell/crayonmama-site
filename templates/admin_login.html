{% extends 'admin_base.html' %}

{% block title %}
  管理者ログイン | くれよんママ
{% endblock %}

{% block header %}

{% endblock %}
{% block bottom_nav %}

{% endblock %}

{% block content %}
  <div class="login-page">
    <div class="login-box">
      <div class="login-symbol">✎</div>

      <h1 class="login-title">くれよんママ</h1>
      <p class="login-subtitle">管理者ログイン</p>

      <div class="form-card login-card">
        {% if error %}
          <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('admin_login') }}">
          <div class="form-group">
            <label class="form-label" for="email">メールアドレス</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="admin@example.com" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">パスワード</label>
            <div class="password-wrap">
              <input type="password" id="password" name="password" class="form-input password-input" placeholder="パスワードを入力" required />
              <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
            </div>
          </div>

          <button type="submit" class="primary-button">ログイン</button>
        </form>
      </div>

      <p class="login-note">※ 管理者専用ページです</p>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password')
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text'
      } else {
        passwordInput.type = 'password'
      }
    }
  </script>
{% endblock %}
